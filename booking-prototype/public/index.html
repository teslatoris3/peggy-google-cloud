<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peggy — Book Appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--brand-bg:#F7F3F0;--brand-accent:#C7936B;--brand-deep:#222228;--muted:#6B6B6B}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--brand-bg); color:var(--brand-deep); -webkit-font-smoothing:antialiased; padding:24px}
    .container{max-width:720px;margin:0 auto}
    .card{background:#fff;border:1px solid #efe8e2;border-radius:12px;padding:20px}
    h1{font-family:'Playfair Display',serif;margin:0 0 8px;font-size:28px}
    p.lead{color:var(--muted);margin:0 0 18px}
    form{display:grid;gap:12px}
    label{font-size:14px;color:var(--brand-deep)}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #e6dcca;border-radius:8px;background:#fff}
    .row{display:flex;gap:12px}
    .row > *{flex:1}
    .small{font-size:13px;color:var(--muted)}
    .btn{background:var(--brand-accent);border:none;color:#111;padding:12px 16px;border-radius:10px;font-weight:600;cursor:pointer}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .muted-note{font-size:13px;color:var(--muted)}
    .availability-note{font-size:13px;color:var(--muted);margin-top:6px}
    .availability-error{font-size:13px;color:#8a2d2d;margin-top:6px;min-height:18px}
    @media (max-width:520px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Book & Pay Deposit</h1>
      <p class="lead">Enter your details below to confirm an appointment. Deposits secure the booking.</p>

      <form id="booking-form">
        <label>Full name
          <input name="customerName" required placeholder="Jane Doe" />
        </label>

        <label>Email
          <input name="email" type="email" required placeholder="you@example.com" />
        </label>

        <div class="row">
          <label>Phone
            <input name="phone" placeholder="(555) 555-5555" />
          </label>
          <label>Service
            <select name="serviceName">
              <option>Haircut & Style</option>
              <option>Balayage</option>
              <option>Full Colour</option>
              <option>Keratin Treatment</option>
              <option>Bridal Style</option>
            </select>
          </label>
        </div>

        <label>Birthday
          <input name="birthday" type="date" placeholder="YYYY-MM-DD" />
        </label>
        <label>Appointment date & time
          <input id="appointmentTime" name="appointmentTime" type="datetime-local" required />
          <div id="availabilityNote" class="availability-note"></div>
          <div id="availabilityError" class="availability-error"></div>
        </label>

        <label>Deposit amount (USD)
          <input id="depositAmount" name="depositAmount" type="number" step="0.01" value="10.00" required />
        </label>
        <div class="small muted-note">Deposits may be collected via the payment flow. If payment is unavailable, the booking will still be recorded and confirmed by the salon.</div>

        <div style="margin-top:8px;display:flex;gap:10px;align-items:center">
          <button id="submitBtn" class="btn" type="submit">Book and Pay Deposit</button>
          <div class="small">We will email confirmation after booking.</div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('booking-form');
    const appointmentInput = document.getElementById('appointmentTime');
    const availabilityNote = document.getElementById('availabilityNote');
    const availabilityError = document.getElementById('availabilityError');
    const submitBtn = document.getElementById('submitBtn');
    let availability = { open: true, openTime: '09:00', closeTime: '17:00', closedDates: [] };

    function datePart(value) {
      return String(value || '').slice(0, 10);
    }

    function timePart(value) {
      return String(value || '').slice(11, 16);
    }

    function timeToMinutes(value) {
      const parts = String(value || '').split(':').map(Number);
      if (parts.length !== 2 || parts.some(Number.isNaN)) return null;
      return parts[0] * 60 + parts[1];
    }

    function getAvailabilityMessage(value) {
      if (!availability.open) return 'Online booking is closed right now. Please call the salon to book.';
      if (!value) return '';
      const date = datePart(value);
      const selectedTime = timeToMinutes(timePart(value));
      const openTime = timeToMinutes(availability.openTime);
      const closeTime = timeToMinutes(availability.closeTime);
      if ((availability.closedDates || []).includes(date)) return 'Peggy is closed on that date. Please choose another day.';
      if (selectedTime === null || openTime === null || closeTime === null) return '';
      if (selectedTime < openTime || selectedTime >= closeTime) {
        return `Please choose a time between ${availability.openTime} and ${availability.closeTime}.`;
      }
      return '';
    }

    function updateAvailabilityMessage() {
      const message = getAvailabilityMessage(appointmentInput.value);
      availabilityError.textContent = message;
      submitBtn.disabled = Boolean(message);
      return message;
    }

    async function loadAvailability() {
      try {
        const res = await fetch('/availability');
        availability = await res.json();
        availabilityNote.textContent = availability.open
          ? `Online booking hours: ${availability.openTime} to ${availability.closeTime}.`
          : 'Online booking is closed right now. Please call the salon to book.';
        updateAvailabilityMessage();
      } catch (e) {
        availabilityNote.textContent = 'Availability will be confirmed by the salon.';
      }
    }

    appointmentInput.addEventListener('input', updateAvailabilityMessage);
    loadAvailability();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const availabilityMessage = updateAvailabilityMessage();
      if (availabilityMessage) {
        alert(availabilityMessage);
        return;
      }
      const data = Object.fromEntries(new FormData(form).entries());
      data.depositAmount = parseFloat(data.depositAmount || 0);

      try {
        const res = await fetch('/create-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.checkoutUrl) {
          window.location = json.checkoutUrl;
        } else if (json.ok || json.bookingId) {
          alert('Booking created — reference: ' + (json.bookingId || 'n/a'));
          form.reset();
          updateAvailabilityMessage();
        } else {
          alert('Error creating booking: ' + (json.message || json.error || 'unknown'));
        }
      } catch (err) {
        alert('Network error creating booking');
        console.error(err);
      }
    });
  </script>
</body>
</html>
