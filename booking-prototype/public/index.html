<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peggy — Book Appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--brand-bg:#F7F3F0;--brand-accent:#C7936B;--brand-deep:#222228;--muted:#6B6B6B}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--brand-bg); color:var(--brand-deep); -webkit-font-smoothing:antialiased; padding:24px}
    .container{max-width:720px;margin:0 auto}
    .card{background:#fff;border:1px solid #efe8e2;border-radius:12px;padding:20px}
    h1{font-family:'Playfair Display',serif;margin:0 0 8px;font-size:28px}
    p.lead{color:var(--muted);margin:0 0 18px}
    form{display:grid;gap:12px}
    label{font-size:14px;color:var(--brand-deep)}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #e6dcca;border-radius:8px;background:#fff}
    .row{display:flex;gap:12px}
    .row > *{flex:1}
    .small{font-size:13px;color:var(--muted)}
    .btn{background:var(--brand-accent);border:none;color:#111;padding:12px 16px;border-radius:10px;font-weight:600;cursor:pointer}
    .muted-note{font-size:13px;color:var(--muted)}
    @media (max-width:520px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Book & Pay Deposit</h1>
      <p class="lead">Enter your details below to confirm an appointment. Deposits secure the booking.</p>

      <form id="booking-form">
        <label>Full name
          <input name="customerName" required placeholder="Jane Doe" />
        </label>

        <label>Email
          <input name="email" type="email" required placeholder="you@example.com" />
        </label>

        <div class="row">
          <label>Phone
            <input name="phone" placeholder="(555) 555-5555" />
          </label>
          <label>Service
            <select name="serviceName">
              <option>Haircut & Style</option>
              <option>Balayage</option>
              <option>Full Colour</option>
              <option>Keratin Treatment</option>
              <option>Bridal Style</option>
            </select>
          </label>
        </div>

        <label>Birthday
          <input name="birthday" type="date" placeholder="YYYY-MM-DD" />
        </label>
        <label>Appointment date & time
          <input id="appointmentTime" name="appointmentTime" type="datetime-local" required />
        </label>

        <label>Deposit amount (USD)
          <input id="depositAmount" name="depositAmount" type="number" step="0.01" value="10.00" required />
        </label>
        <div class="small muted-note">Deposits may be collected via the payment flow. If payment is unavailable, the booking will still be recorded and confirmed by the salon.</div>

        <div style="margin-top:8px;display:flex;gap:10px;align-items:center">
          <button class="btn" type="submit">Book and Pay Deposit</button>
          <div class="small">We will email confirmation after booking.</div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('booking-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      data.depositAmount = parseFloat(data.depositAmount || 0);

      try {
        const res = await fetch('/create-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.checkoutUrl) {
          window.location = json.checkoutUrl;
        } else if (json.ok || json.bookingId) {
          alert('Booking created — reference: ' + (json.bookingId || 'n/a'));
          form.reset();
        } else {
          alert('Error creating booking: ' + (json.error || 'unknown'));
        }
      } catch (err) {
        alert('Network error creating booking');
        console.error(err);
      }
    });
  </script>
</body>
</html>
