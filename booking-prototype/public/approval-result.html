<!doctype html>
<html>
<head><meta charset="utf-8" /><title>Approval Result</title></head>
<body>
  <h1 id="title">Processing...</h1>
  <p id="msg"></p>
  <script>
    async function run() {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const action = params.get('action');
      if (!token || !action) {
        document.getElementById('title').textContent = 'Invalid link';
        return;
      }
      document.getElementById('title').textContent = 'Processing...';
      const res = await fetch(`/api/${action}/${token}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        document.getElementById('title').textContent = 'Error';
        document.getElementById('msg').textContent = err.error || 'Failed to process request';
        return;
      }
      const json = await res.json();
      document.getElementById('title').textContent = json.ok ? 'Success' : 'Result';
      document.getElementById('msg').innerHTML = json.ok ? `Booking ${json.booking.id} is now ${json.booking.status}.` : JSON.stringify(json);
    }
    run();
  </script>
</body>
</html>
